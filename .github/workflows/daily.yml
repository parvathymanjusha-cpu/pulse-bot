name: Pulse - Daily Summary Bot

on:
  schedule:
    - cron: '30 2 * * *'  # Runs at 8:00 AM IST everyday automatically
  workflow_dispatch:      # Gives you a manual run button

  run-pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Pulse bot
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}  # Added this line!
        run: python bot.py
        
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-summary
          path: daily_summary.txt