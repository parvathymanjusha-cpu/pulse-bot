name: Pulse - Master Automation Engine

on:
  workflow_dispatch:

# Crucial permission block to allow the Action runner to save projects.json back into your repo
permissions:
  contents: write

jobs:
  run-all-tasks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Task 1 - Run Weather Bot
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: python bot.py

      - name: Task 2 - Run News Bot
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python news_bot.py

      - name: Task 3 - Generate Projects Data
        run: python portfolio_updater.py

      - name: Task 3 - Auto-Commit JSON File Back to Repo
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add projects.json
          # Only commits if the repository list has changes
          git diff-index --quiet HEAD || git commit -m "chore: auto-update projects.json layout [skip ci]"
          git push origin main